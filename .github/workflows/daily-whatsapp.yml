name: Daily WhatsApp Notifications

on:
  schedule:
    # 7:00 AM IST = 1:30 AM UTC
    - cron: '30 1 * * *'
    # 7:00 PM IST = 1:30 PM UTC  
    - cron: '30 13 * * *'
  workflow_dispatch: # manual trigger

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
      - name: Determine slot
        id: slot
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "01" ]; then
            echo "slot=morning" >> $GITHUB_OUTPUT
          else
            echo "slot=evening" >> $GITHUB_OUTPUT
          fi

      - name: Send morning reminders
        if: steps.slot.outputs.slot == 'morning'
        continue-on-error: true
        run: |
          echo "Sending morning reminders..."
          curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X GET \
            "https://sasasssss.vercel.app/api/cron/send-reminders?slot=morning" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Send evening summary
        if: steps.slot.outputs.slot == 'evening'
        continue-on-error: true
        run: |
          echo "Sending evening summary..."
          curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X GET \
            "https://sasasssss.vercel.app/api/cron/send-reminders?slot=evening" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Check overdue tasks
        continue-on-error: true
        run: |
          echo "Checking overdue tasks..."
          curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X GET \
            "https://sasasssss.vercel.app/api/cron/send-reminders?slot=overdue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Payment followups
        continue-on-error: true
        run: |
          echo "Checking payments..."
          curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X GET \
            "https://sasasssss.vercel.app/api/cron/send-reminders?slot=payment" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
