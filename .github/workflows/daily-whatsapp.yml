name: Daily WhatsApp Messages

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: '30 2 * * *'
    # 8:00 PM IST = 2:30 PM UTC
    - cron: '30 14 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: 'morning or evening'
        required: true
        default: 'morning'

jobs:
  send-whatsapp:
    runs-on: ubuntu-latest
    steps:
      - name: Determine time slot
        id: slot
        run: |
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          echo "UTC time: $HOUR:$MIN"
          if [ "$HOUR" = "02" ]; then
            echo "slot=morning" >> $GITHUB_OUTPUT
          else
            echo "slot=evening" >> $GITHUB_OUTPUT
          fi

      - name: Set manual slot
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
        id: manual_slot

      - name: Send WhatsApp Messages
        run: |
          SLOT="${{ steps.slot.outputs.slot || steps.manual_slot.outputs.slot }}"
          echo "Sending slot: $SLOT"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            "https://sasasssss.vercel.app/api/cron/send-reminders?slot=$SLOT" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 55)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAILED with status $HTTP_CODE"
            exit 1
          fi
          
          echo "SUCCESS"
