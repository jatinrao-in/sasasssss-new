name: Daily WhatsApp Notifications
on:
  schedule:
    - cron: '0 4 * * *'  # 9:30 AM IST
    - cron: '30 13 * * *' # 7:00 PM IST
  workflow_dispatch:

jobs:
  daily-member-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send morning reminders
        run: |
          curl -f -X GET \
          "https://sasasssss.vercel.app/api/cron/send-reminders?slot=morning" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json" \
          || echo "API call failed but continuing"
        continue-on-error: true

  overdue-calculator:
    runs-on: ubuntu-latest
    steps:
      - name: Check overdue tasks
        run: |
          curl -f -X GET \
          "https://sasasssss.vercel.app/api/cron/send-reminders?slot=overdue" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          || echo "API call failed but continuing"
        continue-on-error: true

  deadline-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send deadline reminders
        run: |
          curl -f -X GET \
          "https://sasasssss.vercel.app/api/cron/send-reminders?slot=deadline" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          || echo "API call failed but continuing"
        continue-on-error: true

  payment-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Send payment reminders
        run: |
          curl -f -X GET \
          "https://sasasssss.vercel.app/api/cron/send-reminders?slot=payment" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          || echo "API call failed but continuing"
        continue-on-error: true

  admin-daily-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Send admin summary
        run: |
          curl -f -X GET \
          "https://sasasssss.vercel.app/api/cron/send-reminders?slot=evening" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          || echo "API call failed but continuing"
        continue-on-error: true
